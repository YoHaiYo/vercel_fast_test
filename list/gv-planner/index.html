    notes: s.notes.replace(/「.*?」/, `「${name}」`),
  }));
};

/* =====================================================================
   UTILITY
   ===================================================================== */
const calcProgress = (steps) => {
  if (!steps || steps.length === 0) return 0;
  const total = steps.length;
  const completed = steps.filter(s => s.status === 'completed').length;
  const active = steps.find(s => s.status === 'active');
  let prog = completed / total;
  if (active) {
    const ck = active.checklist;
    const ckDone = ck.filter(c => c.done).length;
    prog += (ck.length > 0 ? ckDone / ck.length : 0) * (1 / total);
  }
  return Math.min(100, Math.round(prog * 100));
};

/* ── Status Badge ── */
const StatusBadge = ({ status }) => {
  const map = {
    completed: 'bg-green-100 text-green-700 border-green-200',
    active:    'bg-blue-100 text-blue-700 border-blue-200',
    pending:   'bg-gray-100 text-gray-500 border-gray-200',
  };
  const label = { completed:'완료', active:'진행중', pending:'대기' };
  return (
    <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full border ${map[status]}`}>
      {label[status]}
    </span>
  );
};

/* ── Step Flow Chart ── */
const StepFlow = ({ steps, selectedIdx, onSelect }) => (
  <div className="overflow-x-auto pb-2 -mx-1 px-1">
    <div className="flex items-start min-w-max py-2 gap-0">
      {steps.map((step, i) => {
        const isSelected = i === selectedIdx;
        const isDone = step.status === 'completed';
        const isActive = step.status === 'active';
        const isPending = step.status === 'pending';
        return (
          <div key={i} className="flex items-center">
            <button
              onClick={() => onSelect(i)}
              className={`flex flex-col items-center w-[80px] sm:w-[96px] group focus:outline-none`}
            >
              <div className={`
                w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold border-2 transition-all
                ${isDone   ? 'bg-green-500 border-green-500 text-white'           : ''}
                ${isActive ? 'bg-blue-600 border-blue-600 text-white step-node-active' : ''}
                ${isPending? 'bg-white border-gray-300 text-gray-400'             : ''}
                ${isSelected ? 'ring-4 ring-offset-1 ring-blue-300 scale-110' : 'group-hover:scale-105'}
              `}>
                {isDone ? '✓' : i + 1}
              </div>
              <div className={`mt-1.5 text-[11px] font-medium text-center leading-tight px-1
                ${isDone ? 'text-green-600' : isActive ? 'text-blue-700 font-bold' : 'text-gray-400'}
                ${isSelected ? 'font-bold' : ''}
              `}>
                {step.name}
              </div>
              {isActive && (
                <span className="mt-1 text-[9px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded-full font-semibold">진행중</span>
              )}
              {isDone && (
                <span className="mt-1 text-[9px] bg-green-100 text-green-600 px-1.5 py-0.5 rounded-full font-semibold">완료</span>
              )}
            </button>
            {i < steps.length - 1 && (
              <div className="flex items-center pb-5 mx-0.5">
                <div className={`h-px w-4 sm:w-5 ${isDone ? 'bg-green-400' : 'bg-gray-200'}`}></div>
                <svg className={`w-3 h-3 ${isDone ? 'text-green-400' : 'text-gray-300'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                </svg>
              </div>
            )}
          </div>
        );
      })}
    </div>
  </div>
);

      <p className="text-xs text-gray-500 mb-3 line-clamp-2 leading-relaxed">{task.description}</p>

/* =====================================================================
   TASK DETAIL VIEW
   ===================================================================== */
const TaskDetailView = ({ task, onBack, onUpdate, onDelete }) => {
  const [selectedStep, setSelectedStep] = useState(() => {
    const ai = task.steps.findIndex(s => s.status === 'active');
    return ai >= 0 ? ai : 0;
  });
  const [showDeleteModal, setShowDeleteModal] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [editName, setEditName] = useState(task.name);
  const [editDesc, setEditDesc] = useState(task.description);

  const step = task.steps[selectedStep];
  const progress = calcProgress(task.steps);
  const done = isAllDone(task);

  const toggleCheck = (checkId) => {
    const newSteps = task.steps.map((s, si) => {
      if (si !== selectedStep) return s;
      return {
        ...s,
        checklist: s.checklist.map(c => c.id === checkId ? { ...c, done: !c.done } : c),
      };
    });
    onUpdate({ ...task, steps: newSteps });
  };

  const advanceStep = () => {
    if (selectedStep >= task.steps.length - 1) return;
    const newSteps = task.steps.map((s, i) => {
      if (i === selectedStep) return { ...s, status: 'completed', checklist: s.checklist.map(c => ({ ...c, done: true })) };
      if (i === selectedStep + 1) return { ...s, status: 'active' };
      return s;
    });
    const newTask = { ...task, currentStep: selectedStep + 1, steps: newSteps };
    onUpdate(newTask);
    setSelectedStep(selectedStep + 1);
  };

  const saveEdit = () => {
    onUpdate({ ...task, name: editName, description: editDesc });
    setEditMode(false);
  };

  return (
    <div className="fade-in max-w-7xl mx-auto px-4 sm:px-6 py-6">
      {/* Breadcrumb */}
      <div className="flex items-center gap-2 text-sm text-gray-400 mb-4">
        <button onClick={onBack} className="hover:text-blue-600 transition-colors font-medium">대시보드</button>
        <span>›</span>
        <span className="text-gray-600 font-semibold truncate">{task.name}</span>
      </div>

      {/* Task Header Card */}
      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-5 shadow-sm">
        {editMode ? (
          <div className="space-y-3">
            <input
              value={editName}
              onChange={e => setEditName(e.target.value)}
              className="w-full text-xl font-bold border-b-2 border-blue-400 pb-1 focus:border-blue-600 text-gray-800 bg-transparent"
            />
            <textarea
              value={editDesc}
              onChange={e => setEditDesc(e.target.value)}
              rows={2}
              className="w-full text-sm text-gray-600 border rounded-lg p-2 resize-none"
            />
            <div className="flex gap-2">
              <button onClick={saveEdit} className="px-4 py-1.5 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors">저장</button>
              <button onClick={() => setEditMode(false)} className="px-4 py-1.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors">취소</button>
            </div>
          </div>
        ) : (
          <div className="flex items-start justify-between gap-4">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-1 flex-wrap">
                <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${typeBadge(task.type)}`}>
                  {typeIcon(task.type)} {typeLabel(task.type)}
                </span>
                <StatusBadge status={done ? 'completed' : 'active'} />
              </div>
              <h1 className="text-xl font-extrabold text-gray-800 mb-1">{task.name}</h1>
              <p className="text-sm text-gray-500 leading-relaxed">{task.description}</p>
              <div className="flex flex-wrap gap-4 mt-3 text-xs text-gray-500">
                <span>👤 {task.manager} · {task.department}</span>
                <span>📅 시작: {task.startDate}</span>
                <span>🎯 목표: {task.targetDate}</span>
              </div>
            </div>
            <div className="flex flex-col items-end gap-2 flex-shrink-0">
              <div className="text-right">
                <div className="text-3xl font-extrabold text-blue-600 tabular-nums">{progress}%</div>
                <div className="text-xs text-gray-400">전체 진행률</div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => setEditMode(true)} className="text-xs px-3 py-1.5 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
                  ✏️ 편집
                </button>
                <button onClick={() => setShowDeleteModal(true)} className="text-xs px-3 py-1.5 border border-red-200 rounded-lg text-red-600 hover:bg-red-50 transition-colors">
                  🗑️ 삭제
                </button>
              </div>
            </div>
          </div>
        )}
        {/* Overall progress bar */}
        <div className="mt-4">
          <div className="w-full bg-gray-100 rounded-full h-2">
            <div
              className={`h-2 rounded-full progress-bar ${done ? 'bg-green-500' : 'bg-blue-500'}`}
              style={{ width: `${progress}%` }}
            />
          </div>
        </div>
      </div>

      {/* Step Flow Chart */}
      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-5 shadow-sm">
        <h2 className="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
          <span className="w-5 h-5 bg-blue-100 rounded-md flex items-center justify-center text-blue-600 text-xs">⟳</span>
          업무 단계 흐름도
          <span className="text-xs font-normal text-gray-400 ml-1">· 단계를 클릭하면 상세 내용을 확인할 수 있습니다</span>
        </h2>
        <StepFlow steps={task.steps} selectedIdx={selectedStep} onSelect={setSelectedStep} />
      </div>

      {/* Step Detail */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
        {/* Checklist */}
        <div className="lg:col-span-2 bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <div>
              <div className="flex items-center gap-2 mb-0.5">
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full
                  ${step.status === 'completed' ? 'bg-green-100 text-green-700' :
                    step.status === 'active' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-500'}`}>
                  {selectedStep + 1}단계
                </span>
                <StatusBadge status={step.status} />
              </div>
              <h2 className="text-lg font-extrabold text-gray-800">{step.name}</h2>
            </div>
            <div className="text-right">
              <div className="text-xs text-gray-400">예상 소요기간</div>
              <div className="text-sm font-bold text-gray-700">⏱ {step.duration}</div>
            </div>
          </div>

          <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 mb-4 text-xs text-blue-800 leading-relaxed">
            <span className="font-bold">💡 주의사항 </span>{step.notes}
          </div>

          <div className="mb-2 flex items-center justify-between">
            <h3 className="text-sm font-bold text-gray-700">체크리스트</h3>
            <span className="text-xs text-gray-400">
              {step.checklist.filter(c => c.done).length} / {step.checklist.length} 완료
            </span>
          </div>
          <div className="space-y-2">
            {step.checklist.map(c => (
              <label
                key={c.id}
                className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors
                  ${c.done ? 'bg-green-50 border border-green-100' : 'bg-gray-50 border border-gray-100 hover:bg-blue-50'}`}
              >
                <input
                  type="checkbox"
                  checked={c.done}
                  onChange={() => toggleCheck(c.id)}
                  className="w-4 h-4 rounded accent-blue-600 cursor-pointer"
                />
                <span className={`text-sm flex-1 ${c.done ? 'line-through text-gray-400' : 'text-gray-700'}`}>
                  {c.item}
                </span>
                {c.done && <span className="text-green-500 text-sm">✓</span>}
              </label>
            ))}
          </div>

          {/* Action buttons */}
          <div className="flex gap-3 mt-5">
            {selectedStep > 0 && (
              <button
                onClick={() => setSelectedStep(s => s - 1)}
                className="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors"
              >
                ← 이전 단계
              </button>
            )}
            {step.status === 'active' && !done && (
              <button
                onClick={advanceStep}
                className="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold transition-colors shadow-sm"
              >
                ✅ 단계 완료 후 다음으로
              </button>
            )}
            {step.status !== 'active' && selectedStep < task.steps.length - 1 && (
              <button
                onClick={() => setSelectedStep(s => s + 1)}
                className="flex-1 py-2.5 border border-blue-200 bg-blue-50 rounded-xl text-sm font-semibold text-blue-700 hover:bg-blue-100 transition-colors"
              >
                다음 단계 →
              </button>
            )}
          </div>
        </div>

        {/* Side panel */}
        <div className="space-y-4">
          {/* Required documents */}
          <div className="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
            <h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
              <span>📄</span> 필요 서류
            </h3>
            <ul className="space-y-2">
              {step.documents.map((doc, i) => (
                <li key={i} className="flex items-center gap-2 text-sm text-gray-600 bg-gray-50 rounded-lg px-3 py-2">
                  <span className="text-blue-400 text-xs">▸</span>
                  {doc}
                </li>
              ))}
            </ul>
          </div>

          {/* Step summary */}
          <div className="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
            <h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
              <span>📊</span> 전체 단계 현황
            </h3>
            <div className="space-y-2">
              {task.steps.map((s, i) => (
                <button
                  key={i}
                  onClick={() => setSelectedStep(i)}
                  className={`w-full flex items-center gap-2.5 p-2 rounded-lg text-left transition-colors
                    ${i === selectedStep ? 'bg-blue-50 border border-blue-100' : 'hover:bg-gray-50'}`}
                >
                  <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0
                    ${s.status === 'completed' ? 'bg-green-500 text-white' :
                      s.status === 'active' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-400'}`}>
                    {s.status === 'completed' ? '✓' : i + 1}
                  </div>
                  <span className={`text-xs flex-1 truncate
                    ${s.status === 'active' ? 'font-bold text-blue-700' :
                      s.status === 'completed' ? 'text-green-700' : 'text-gray-400'}`}>
                    {s.name}
                  </span>
                  <StatusBadge status={s.status} />
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {showDeleteModal && (
        <ConfirmModal
          message={`「${task.name}」을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`}
          onConfirm={() => { setShowDeleteModal(false); onDelete(task.id); }}
          onCancel={() => setShowDeleteModal(false)}
        />
      )}
    </div>
  );
};

/* =====================================================================

const NewTaskView = ({ onBack, onSave }) => {
  const [form, setForm] = useState({ name: '', type: 'event', description: '' });
  const [aiState, setAiState] = useState('idle'); // idle | loading | done
  const [genSteps, setGenSteps] = useState([]);
  const [expandedStep, setExpandedStep] = useState(null);
  const [editingStep, setEditingStep] = useState(null);
  const [editName, setEditName] = useState('');

  const canGenerate = form.name.trim().length >= 2;

  const handleAiGenerate = () => {
    if (!canGenerate) return;
    setAiState('loading');
    setGenSteps([]);
    setTimeout(() => {
      const steps = mockAiGenerate(form.name, form.type);
      setGenSteps(steps);
      setAiState('done');
      setExpandedStep(0);
    }, 2200);
  };

  const handleSave = () => {
    if (!form.name.trim() || genSteps.length === 0) return;
    const task = {
      id: newId(),
      name: form.name,
      type: form.type,
      description: form.description || `${typeLabel(form.type)} 업무: ${form.name}`,
      currentStep: 0,
      manager: '홍길동',
      department: '행정지원팀',
      startDate: new Date().toISOString().slice(0, 10),
      targetDate: '',
      steps: genSteps,
    };
    onSave(task);
  };

  const startEditStepName = (i, name) => {
    setEditingStep(i);
    setEditName(name);
  };

  const saveStepName = () => {
    setGenSteps(gs => gs.map((s, i) => i === editingStep ? { ...s, name: editName } : s));
    setEditingStep(null);
  };

  return (
    <div className="fade-in max-w-3xl mx-auto px-4 sm:px-6 py-6">
      {/* Breadcrumb */}
      <div className="flex items-center gap-2 text-sm text-gray-400 mb-4">
        <button onClick={onBack} className="hover:text-blue-600 transition-colors font-medium">대시보드</button>
        <span>›</span>
        <span className="text-gray-600 font-semibold">새 업무 추가</span>
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-5">
        <h1 className="text-xl font-extrabold text-gray-800 mb-1">새 업무 등록</h1>
        <p className="text-sm text-gray-500 mb-5">업무 정보를 입력하면 AI가 최적화된 진행 단계를 자동으로 생성합니다.</p>

        {/* Form */}
        <div className="space-y-4">
          <div>
            <label className="block text-xs font-bold text-gray-600 mb-1.5">업무명 <span className="text-red-500">*</span></label>
            <input
              type="text"
              value={form.name}
              onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
              placeholder="예: 2025 하반기 주민설명회"
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition-colors"
            />
          </div>
          <div>
            <label className="block text-xs font-bold text-gray-600 mb-1.5">업무 유형 <span className="text-red-500">*</span></label>
            <div className="flex gap-3">
              {[['event','🎉 행사'], ['construction','🏗️ 공사']].map(([val, label]) => (
                <label key={val} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl border-2 cursor-pointer transition-all font-semibold text-sm
                  ${form.type === val ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                  <input type="radio" value={val} checked={form.type === val} onChange={() => setForm(f => ({ ...f, type: val }))} className="hidden" />
                  {label}
                </label>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-xs font-bold text-gray-600 mb-1.5">업무 설명</label>
            <textarea
              value={form.description}
              onChange={e => setForm(f => ({ ...f, description: e.target.value }))}
              placeholder="업무의 목적, 배경, 특이사항 등을 간략히 입력하세요 (선택)"
              rows={3}
              className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm resize-none focus:border-blue-400 transition-colors"
            />
          </div>
        </div>

        {/* AI Generate Button */}
        <div className="mt-5">
          <button
            onClick={handleAiGenerate}
            disabled={!canGenerate || aiState === 'loading'}
            className={`w-full py-3.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all
              ${canGenerate && aiState !== 'loading'
                ? 'bg-gradient-to-r from-[#1b3a5c] to-blue-600 text-white shadow-md hover:shadow-lg hover:from-[#1e4470] hover:to-blue-700'
                : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}
          >
            {aiState === 'loading' ? (
              <>
                <svg className="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                AI가 프로세스를 생성하고 있습니다...
              </>
            ) : aiState === 'done' ? (
              <>✨ AI 프로세스 재생성</>
            ) : (
              <>✨ AI 자동 프로세스 생성</>
            )}
          </button>
          {!canGenerate && <p className="text-[11px] text-gray-400 text-center mt-1.5">업무명을 2자 이상 입력하면 생성이 가능합니다.</p>}
        </div>
      </div>

      {/* AI Loading Skeleton */}
      {aiState === 'loading' && (
        <div className="bg-white rounded-2xl border border-blue-100 shadow-sm p-6 fade-in">
          <div className="flex items-center gap-3 mb-4">
            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center animate-pulse">
              <svg className="w-4 h-4 text-white animate-spin" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
            </div>
            <div>
              <p className="text-sm font-bold text-gray-700">AI 분석 중...</p>
              <p className="text-xs text-gray-400">「{form.name}」에 맞는 최적 프로세스를 생성하고 있습니다.</p>
            </div>
          </div>
          <div className="space-y-3">
            {[100, 85, 90, 75, 80, 70].map((w, i) => (
              <div key={i} className="flex gap-3 items-center">
                <div className="w-8 h-8 rounded-full ai-shimmer flex-shrink-0"></div>
                <div className="flex-1 space-y-1.5">
                  <div className="h-3 rounded ai-shimmer" style={{ width: `${w}%` }}></div>
                  <div className="h-2 rounded ai-shimmer" style={{ width: `${w * 0.7}%` }}></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Generated Process */}
      {aiState === 'done' && genSteps.length > 0 && (
        <div className="bg-white rounded-2xl border border-green-100 shadow-sm p-6 fade-in">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2">
              <span className="text-xl">✨</span>
              <div>
                <p className="text-sm font-extrabold text-gray-800">AI 생성 완료</p>
                <p className="text-xs text-gray-500">{genSteps.length}개 단계가 생성되었습니다. 단계명을 클릭해 수정할 수 있습니다.</p>
              </div>
            </div>
            <span className="text-xs text-green-600 bg-green-100 border border-green-200 px-2 py-1 rounded-full font-semibold">생성 완료 ✓</span>
          </div>

          {/* Mini flow */}
          <div className="overflow-x-auto mb-5 pb-1">
            <div className="flex items-center gap-1 min-w-max">
              {genSteps.map((s, i) => (
                <div key={i} className="flex items-center">
                  <div className={`text-[10px] px-2 py-1 rounded-full font-semibold
                    ${i === 0 ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'}`}>
                    {i+1}. {s.name}
                  </div>
                  {i < genSteps.length - 1 && <span className="text-gray-300 mx-1 text-xs">→</span>}
                </div>
              ))}
            </div>
          </div>

          {/* Expandable step list */}
          <div className="space-y-2">
            {genSteps.map((s, i) => (
              <div key={i} className={`border rounded-xl overflow-hidden transition-all
                ${expandedStep === i ? 'border-blue-200 shadow-sm' : 'border-gray-100'}`}>
                <button
                  className={`w-full flex items-center gap-3 p-3.5 text-left transition-colors
                    ${expandedStep === i ? 'bg-blue-50' : 'hover:bg-gray-50'}`}
                  onClick={() => setExpandedStep(expandedStep === i ? null : i)}
                >
                  <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0
                    ${i === 0 ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-500'}`}>
                    {i + 1}
                  </div>
                  <div className="flex-1 min-w-0">
                    {editingStep === i ? (
                      <div className="flex gap-2" onClick={e => e.stopPropagation()}>
                        <input
                          value={editName}
                          onChange={e => setEditName(e.target.value)}
                          className="flex-1 text-sm border-b border-blue-400 bg-transparent focus:outline-none"
                          autoFocus
                        />
                        <button onClick={saveStepName} className="text-xs text-blue-600 font-bold hover:text-blue-800">저장</button>
                        <button onClick={() => setEditingStep(null)} className="text-xs text-gray-400 hover:text-gray-600">취소</button>
                      </div>
                    ) : (
                      <div className="flex items-center gap-2">
                        <span className="text-sm font-bold text-gray-800">{s.name}</span>
                        <button
                          onClick={e => { e.stopPropagation(); startEditStepName(i, s.name); }}
                          className="text-[10px] text-gray-400 hover:text-blue-600 border border-gray-200 hover:border-blue-300 px-1.5 py-0.5 rounded transition-colors"
                        >
                          수정
                        </button>
                      </div>
                    )}
                    <div className="text-[11px] text-gray-400 mt-0.5">⏱ {s.duration} · 체크리스트 {s.checklist.length}개 · 서류 {s.documents.length}종</div>
                  </div>
                  <svg
                    className={`w-4 h-4 text-gray-400 transition-transform flex-shrink-0 ${expandedStep === i ? 'rotate-180' : ''}`}
                    fill="none" stroke="currentColor" viewBox="0 0 24 24"
                  >
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                  </svg>
                </button>

                {expandedStep === i && (
                  <div className="p-4 pt-0 pb-4 bg-blue-50/50 border-t border-blue-100 fade-in">
                    <div className="bg-blue-50 border border-blue-100 rounded-lg p-2.5 mb-3 text-xs text-blue-700">
                      💡 {s.notes}
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      <div>
                        <p className="text-[11px] font-bold text-gray-600 mb-1.5">체크리스트</p>
                        <ul className="space-y-1">
                          {s.checklist.map((c, ci) => (
                            <li key={ci} className="text-xs text-gray-600 flex items-start gap-1.5">
                              <span className="text-gray-300 flex-shrink-0 mt-0.5">□</span>{c.item}
                            </li>
                          ))}
                        </ul>
                      </div>
                      <div>
                        <p className="text-[11px] font-bold text-gray-600 mb-1.5">필요 서류</p>
                        <ul className="space-y-1">
                          {s.documents.map((d, di) => (
                            <li key={di} className="text-xs text-gray-600 flex items-center gap-1.5">
                              <span className="text-blue-400 flex-shrink-0">▸</span>{d}
                            </li>
                          ))}
                        </ul>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Save */}
          <div className="flex gap-3 mt-5">
            <button onClick={onBack} className="flex-1 py-3 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">
              취소
            </button>
            <button
              onClick={handleSave}
              className="flex-1 py-3 bg-[#1b3a5c] hover:bg-[#1e4470] text-white rounded-xl text-sm font-extrabold transition-colors shadow-sm"
            >
              ✅ 업무 등록하기
            </button>
          </div>
        </div>
      )}

      {/* Empty state for new task form */}
      {aiState === 'idle' && (
        <div className="bg-white rounded-2xl border border-dashed border-gray-200 p-8 text-center text-gray-400">
          <div className="text-4xl mb-2">✨</div>
          <p className="text-sm font-medium">업무명을 입력하고 AI 자동 생성 버튼을 눌러보세요</p>
          <p className="text-xs mt-1">행사 또는 공사 유형에 맞게 최적화된 단계와 체크리스트가 생성됩니다.</p>
        </div>
      )}
    </div>
  );
};

/* =====================================================================
   ROOT APP
   ===================================================================== */
const App = () => {
  const [tasks, setTasks] = useState(INITIAL_TASKS);
  const [view, setView] = useState('dashboard');
  const [selectedId, setSelectedId] = useState(null);

  const selectedTask = tasks.find(t => t.id === selectedId) || null;

  const goHome = () => { setView('dashboard'); setSelectedId(null); };
  const goDetail = (id) => { setSelectedId(id); setView('detail'); };
  const goNew = () => setView('new');

  const handleUpdate = (updated) => {
    setTasks(ts => ts.map(t => t.id === updated.id ? updated : t));
  };

  const handleDelete = (id) => {
    setTasks(ts => ts.filter(t => t.id !== id));
    goHome();
  };

  const handleSave = (newTask) => {
    setTasks(ts => [newTask, ...ts]);
    setSelectedId(newTask.id);
    setView('detail');
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <Header onHome={goHome} />
      <main className="pb-16">
        {view === 'dashboard' && (
          <DashboardView tasks={tasks} onSelectTask={goDetail} onNewTask={goNew} />
        )}
        {view === 'detail' && selectedTask && (
          <TaskDetailView
            task={selectedTask}
            onBack={goHome}
            onUpdate={handleUpdate}
            onDelete={handleDelete}
          />
        )}
        {view === 'new' && (
          <NewTaskView onBack={goHome} onSave={handleSave} />
        )}
      </main>

      {/* Footer */}
      <footer className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-2">
        <div className="max-w-7xl mx-auto px-4 flex items-center justify-between text-[11px] text-gray-400">
          <span>업무 프로세스 관리 시스템 · 내부 직원 전용</span>
          <span>Demo v1.0 · {new Date().getFullYear()}</span>
        </div>
      </footer>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
